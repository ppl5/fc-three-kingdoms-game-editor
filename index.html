<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>三國志 - 曹操傳 · 存档编辑器</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&family=Noto+Serif+SC:wght@400;700&display=swap');

  :root {
    --ink: #1a0a00;
    --paper: #f5e9c8;
    --aged: #d4b483;
    --red: #b5271b;
    --gold: #c8861a;
    --jade: #2a6b4a;
    --shadow: #7a4a1a;
    --pixel: #3d1f00;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--ink);
    min-height: 100vh;
    font-family: 'Noto Serif SC', serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 16px 64px;
    background-image: linear-gradient(180deg, #2a0f00 0%, #1a0a00 100%);
    text-rendering: optimizeLegibility;
    -webkit-font-smoothing: antialiased;
  }

  .frame {
    width: 100%;
    max-width: 1040px;
    border: 4px solid var(--gold);
    box-shadow: 0 0 0 6px var(--ink), 0 0 0 8px var(--gold), 0 0 12px rgba(200,134,26,0.2);
    background: var(--paper);
    position: relative;
  }

  .frame::before, .frame::after {
    content: '◈'; position: absolute; color: var(--gold); font-size: 18px; top: -14px;
  }
  .frame::before { left: -14px; }
  .frame::after  { right: -14px; }

  /* HEADER */
  .header {
    background: var(--red);
    padding: 20px 24px 16px;
    border-bottom: 3px solid var(--gold);
    position: relative;
    overflow: hidden;
  }
  .header-main {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }
  .header-art-wrap {
    width: 50%;
    min-width: 110px;
    max-width: 220px;
    display: flex;
    justify-content: center;
  }
  .header-copy {
    flex: 1;
    text-align: center;
  }
  .header-art {
    display: block;
    width: 100%;
    margin: 0;
    border: 2px solid rgba(245,233,200,0.55);
    box-shadow: 0 4px 16px rgba(0,0,0,0.35);
  }
  .title-cn {
    font-family: 'Noto Serif SC', serif;
    font-weight: 700; font-size: clamp(36px, 4.8vw, 54px); color: var(--gold);
    letter-spacing: 6px;
    text-shadow: 2px 2px 0 #5a0000;
    position: relative;
  }
  .badge {
    display: inline-block; background: var(--gold); color: var(--ink);
    font-family: 'Noto Serif SC', serif; font-size: clamp(10px, 1.2vw, 14px);
    padding: 8px 12px; margin-top: 14px; letter-spacing: 1px; position: relative;
  }


  /* UPLOAD */
  .upload-section { padding: 24px 28px 0; }

  .drop-zone {
    border: 3px dashed var(--shadow);
    background: rgba(26,10,0,0.04);
    padding: 36px 24px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }
  .drop-zone:hover, .drop-zone.drag-over {
    border-color: var(--gold);
    background: rgba(200,134,26,0.08);
    box-shadow: inset 0 0 20px rgba(200,134,26,0.1);
  }
  .drop-zone input[type="file"] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }
  .drop-icon { font-size: 42px; margin-bottom: 12px; display: block; }
  .drop-label {
    font-family: 'Noto Serif SC', serif;
    font-size: clamp(10px, 1vw, 13px); color: var(--pixel); line-height: 1.9;
  }
  .drop-sub { font-size: clamp(12px, 1.1vw, 15px); color: var(--shadow); margin-top: 8px; }

  .file-info {
    margin: 12px 0 0; padding: 12px 14px;
    background: rgba(42,107,74,0.08); border-left: 3px solid var(--jade);
    font-family: 'Noto Serif SC', serif; font-size: clamp(9px, 0.95vw, 11px); color: var(--jade);
    display: none; word-break: break-word; line-height: 1.7;
  }
  .file-info.visible { display: block; }
  .file-info-row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
  .file-chip {
    display: inline-flex;
    align-items: center;
    border: 1px solid rgba(42,107,74,0.25);
    background: rgba(255,255,255,0.65);
    padding: 4px 8px;
    border-radius: 4px;
  }
  .file-chip.status-ok {
    color: var(--jade);
    border-color: rgba(42,107,74,0.45);
    background: rgba(42,107,74,0.08);
  }
  .file-chip.status-warn {
    color: var(--red);
    border-color: rgba(181,39,27,0.45);
    background: rgba(181,39,27,0.08);
  }


  /* DIVIDER */
  .divider {
    display: flex; align-items: center; gap: 12px;
    padding: 22px 28px 0; color: var(--shadow); font-size: clamp(14px, 1.2vw, 18px); letter-spacing: 3px;
  }
  .divider::before, .divider::after {
    content: ''; flex: 1; height: 1px;
    background: linear-gradient(to right, transparent, var(--aged), transparent);
  }

  /* FIELDS */
  .fields-section { padding: 16px 28px 28px; display: none; }
  .fields-section.visible {
    display: block;
  }

  .field-group {
    margin-bottom: 14px;
    border: 2px solid var(--aged);
    background: #fffdf6;
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .field-group:last-child { margin-bottom: 0; }
  .field-name {
    font-family: 'Noto Serif SC', serif;
    font-weight: 700;
    font-size: clamp(13px, 1.05vw, 16px);
    color: var(--pixel);
    min-width: 120px;
  }
  .field-addr { color: rgba(181,39,27,0.8); font-size: clamp(10px, 0.9vw, 12px); }
  .field-input {
    width: 220px; border: 2px solid var(--aged); background: var(--paper);
    font-family: 'JetBrains Mono', monospace; font-size: clamp(16px, 1.1vw, 18px); font-weight: 700; color: var(--pixel);
    padding: 8px 10px; outline: none; transition: border-color 0.15s;
  }
  .field-input:focus { border-color: var(--gold); box-shadow: 0 0 0 2px rgba(200,134,26,0.2); }
  .field-input::-webkit-inner-spin-button { -webkit-appearance: none; }

  .range-hint {
    min-width: 74px;
    font-size: clamp(12px, 1vw, 14px);
    color: var(--shadow);
    text-align: left;
  }

  .field-group.changed {
    border-color: var(--jade);
    box-shadow: 0 0 8px rgba(42,107,74,0.3);
    background: #f6fff8;
  }

  /* ADVANCED */
  .advanced-wrap { padding: 16px 28px 0; }
  .advanced-toggle {
    font-family: 'Noto Serif SC', serif;
    font-size: clamp(9px, 0.95vw, 12px); color: var(--shadow);
    cursor: pointer; user-select: none;
    display: inline-flex; align-items: center; gap: 6px; padding: 4px 0;
  }
  .advanced-toggle:hover { color: var(--pixel); }
  .advanced-panel {
    margin-top: 10px; padding: 16px 16px;
    background: rgba(26,10,0,0.04); border: 1px dashed var(--aged);
    display: none;
  }
  .advanced-panel.visible { display: block; }
  .adv-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .adv-label { font-family: 'Noto Serif SC', serif; font-size: clamp(8px, 0.85vw, 10px); color: var(--pixel); min-width: 180px; }
  .adv-input {
    border: 2px solid var(--aged); background: var(--paper);
    font-family: 'JetBrains Mono', monospace; font-size: clamp(13px, 0.95vw, 14px); font-weight: 700; color: var(--pixel);
    padding: 8px 10px; outline: none; width: 126px;
  }
  .adv-input:focus { border-color: var(--gold); }
  .adv-desc { font-size: clamp(12px, 1vw, 14px); color: var(--shadow); }

  /* BUTTONS */
  .actions { padding: 0 28px 28px; display: flex; gap: 14px; flex-wrap: wrap; }
  .btn {
    font-family: 'Noto Serif SC', serif; font-size: clamp(14px, 1.2vw, 18px);
    padding: 14px 20px; border: 3px solid; cursor: pointer;
    letter-spacing: 1px; transition: transform 0.1s;
  }
  .btn:active { transform: translate(2px, 2px); }
  .btn-save { background: var(--red); color: var(--paper); border-color: #8a1010; }
  .btn-save:hover { background: #c8301a; }
  .btn-reset { background: var(--paper); color: var(--pixel); border-color: var(--shadow); }
  .btn-reset:hover { background: var(--aged); }

  /* STATUS */
  .status {
    padding: 12px 28px; font-family: 'JetBrains Mono', monospace;
    font-size: clamp(9px, 0.95vw, 11px); min-height: 38px; border-top: 1px solid var(--aged);
    color: var(--jade); display: none; line-height: 2;
  }
  .status.visible { display: block; }
  .status.error { color: var(--red); }
  .status.warn  { color: var(--gold); }

  .dragon { text-align: center; font-size: 22px; padding: 6px 0 0; letter-spacing: 8px; color: var(--gold); opacity: 0.5; }

  .footer-bar {
    background: var(--red);
    border-top: 3px solid var(--gold);
    padding: 12px 16px 14px;
    text-align: center;
  }
  .footer-links {
    display: flex;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .footer-link {
    font-family: 'Noto Serif SC', serif;
    font-size: clamp(10px, 0.95vw, 13px);
    color: var(--ink);
    text-decoration: none;
    border: 2px solid #8a5a12;
    background: var(--gold);
    padding: 5px 10px;
    border-radius: 4px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 30px;
  }
  .footer-link:hover {
    background: #d79b33;
    border-color: #7a4a1a;
  }

  @media (max-width: 760px) {
    body { padding: 16px 10px 40px; }
    .frame {
      border-width: 3px;
      box-shadow: 0 0 0 5px var(--ink), 0 0 0 7px var(--gold),
        0 0 18px rgba(200,134,26,0.2), inset 0 0 20px rgba(0,0,0,0.18);
    }
    .header { padding: 16px 14px 14px; }
    .header-main {
      flex-direction: column;
      align-items: stretch;
      gap: 10px;
    }
    .header-copy { text-align: center; }
    .header-art-wrap {
      width: 100%;
      min-width: 0;
      max-width: none;
    }
    .header-art {
      width: 100%;
    }
    .footer-bar { padding: 10px 12px 12px; }
    .title-cn {
      font-size: clamp(32px, 8vw, 44px);
      letter-spacing: 3px;
    }
    .upload-section,
    .advanced-wrap,
    .fields-section,
    .actions,
    .status { padding-left: 14px; padding-right: 14px; }
    .drop-zone { padding: 24px 14px; }
    .field-group { align-items: flex-start; }
    .field-input { width: 100%; }
    .range-hint { min-width: 0; text-align: left; }
    .field-name { min-width: 0; }
    .btn { width: 100%; text-align: center; }
  }
</style>
</head>
<body>

<div class="frame">

  <div class="header">
    <div class="header-main">
      <div class="header-art-wrap">
        <img class="header-art" src="./docs/images/caocao_game_screen.png" alt="三國志 曹操傳 開場畫面">
      </div>
      <div class="header-copy">
        <div class="title-cn">三國志 - 曹操傳</div>
        <div class="badge">◄ FC 南晶版 · OPENEMU NESTOPIA NST FORMAT ►</div>
      </div>
    </div>
  </div>


  <div class="divider">✦ 載入存檔 ✦</div>

  <div class="upload-section">

      <span class="drop-icon">📜</span>
      <div class="drop-sub">（從 .oesavestate bundle 內取出的 State 檔案， 并上傳）</div>
    </div>
    <div class="file-info"  id="fileInfo"></div>
  </div>

  <div class="advanced-wrap">
    <div class="advanced-toggle" id="advToggle">▶ ADVANCED · WRM OFFSET OVERRIDE</div>
    <div class="advanced-panel" id="advPanel">
      <div class="adv-row">
        <span class="adv-label">WRM CHUNK OFFSET (hex):</span>
        <input class="adv-input" type="text" id="wrmOffsetInput" value="" placeholder="">
        <span class="adv-desc" id="wrmDefaultText"></span>
      </div>
    </div>
  </div>

  <div class="divider">✦ 編輯欄位 ✦</div>

  <div class="fields-section" id="fieldsSection"></div>

  <div class="actions" id="actionsSection" style="display:none">
    <button class="btn btn-save"  id="btnSave">⬇ 儲存並下載</button>
    <button class="btn btn-reset" id="btnReset">↺ 重置</button>
  </div>

  <div class="status" id="status"></div>
  <div class="dragon">龍 ⚔ 龍</div>
  <div style="height:14px"></div>

  <div class="footer-bar">
  <div class="footer-links">
    <a class="footer-link" href="https://github.com/ppl5/fc-three-kingdoms-game-editor" target="_blank" rel="noopener noreferrer" aria-label="GitHub Repo" title="GitHub Repo">
      <svg aria-hidden="true" viewBox="0 0 16 16" width="16" height="16" fill="currentColor">

  </div>
  </div>

</div>


<script src="./config.js"></script>
<script>
// ─────────────────────────────────────────────────────────────
//  NST Save State — Nestopia core (OpenEmu)
//
//  Structure: NFO · CPU>RAM · PPU · IMG>MPR>WRM (SRAM) · IMG>MPR>VRM
//
//  Runtime values (NES SRAM range, fields) come from config.js.
// ─────────────────────────────────────────────────────────────

const CONFIG = window.EDITOR_CONFIG;
if (!CONFIG || !Array.isArray(CONFIG.fields) || CONFIG.fields.length === 0) {
  throw new Error('Missing or invalid editor config (config.js).');
}

const DEFAULT_WRM = CONFIG.defaultWrm;
const NES_SRAM_BASE = CONFIG.nesSramBase;
const NES_SRAM_END = CONFIG.nesSramEnd;
const FIELDS = CONFIG.fields;

let fileBytes      = null;
let fileName       = '';
let originalValues = {};

// Build field UI from config so future fields only need config updates.
const fieldsRoot = document.getElementById('fieldsSection');
fieldsRoot.innerHTML = FIELDS.map(field => {
  const nesLabel = field.nesAddrs
    .map((addr, index) => toHex(addr, 2) + (index === 0 && field.bytes === 2 ? ' (lo)' : index === 1 && field.bytes === 2 ? ' (hi)' : ''))
    .join(' + ');
  const bitsLabel = (field.bytes * 8) + '-bit' + (field.bytes === 2 ? ' little-endian' : '');
  return '' +
    '<div class="field-group" id="group-' + field.id + '">' +
      '<span class="field-name">' + field.labelEn + ' · ' + field.labelZh + '</span>' +
      '<span class="range-hint">' + field.rangeHint + '</span>' +
      '<input class="field-input" type="number" id="val-' + field.id + '" min="0" max="' + field.max + '" placeholder="0">' +
      '<span class="field-addr">NES: ' + nesLabel + ' · ' + bitsLabel + '</span>' +
    '</div>';
}).join('');

document.getElementById('wrmOffsetInput').value = toHex(DEFAULT_WRM, 4);
document.getElementById('wrmOffsetInput').placeholder = toHex(DEFAULT_WRM, 4);
document.getElementById('wrmDefaultText').innerHTML =
  'Default: <strong>' + toHex(DEFAULT_WRM, 4) + '</strong> — adjust only if values read incorrectly';

// ── Helpers ──────────────────────────────────────────────────
function getWRM() {
  const raw = document.getElementById('wrmOffsetInput').value.trim();
  const n   = parseInt(raw, (raw.startsWith('0x') || raw.startsWith('0X')) ? 16 : 10);
  return isNaN(n) ? DEFAULT_WRM : n;
}

function fileOff(nesAddr) {
  return getWRM() + (nesAddr - NES_SRAM_BASE);
}

function fieldOffsets(field) {
  return field.nesAddrs.map(addr => fileOff(addr));
}

function toHex(val, bytes) {
  return '0x' + val.toString(16).toUpperCase().padStart(bytes * 2, '0');
}

function setStatus(msg, type) {
  const s = document.getElementById('status');
  s.textContent = msg;
  s.className = 'status visible' + (type === 'error' ? ' error' : type === 'warn' ? ' warn' : '');
}

// ── Read / Write ─────────────────────────────────────────────
function readField(bytes, field) {
  const offs = fieldOffsets(field);
  if (field.bytes === 1) return bytes[offs[0]];
  return bytes[offs[0]] | (bytes[offs[1]] << 8);
}

function writeField(bytes, field, value) {
  const offs = fieldOffsets(field);
  bytes[offs[0]] = value & 0xFF;
  if (field.bytes === 2) bytes[offs[1]] = (value >> 8) & 0xFF;
}

function markChanged(id, changed) {
  document.getElementById('group-' + id).classList.toggle('changed', changed);
}

// ── Load ─────────────────────────────────────────────────────
async function loadFile(file) {
  fileName  = file.name;
  const buf = await file.arrayBuffer();
  fileBytes = new Uint8Array(buf);

  const highestOffset = Math.max(...FIELDS.flatMap(field => fieldOffsets(field)));
  const needed = highestOffset + 1;
  if (fileBytes.length < needed) {
    setStatus(
      '✖ File too small (' + fileBytes.length + ' B). Need ≥ ' + needed +
      ' B. Did you open the State file (not the .oesavestate bundle)?', 'error'
    );
    return;
  }

  // Check NST magic: bytes 0–2 = "NST" (0x4E 0x53 0x54)
  const isNST = fileBytes[0] === 0x4E && fileBytes[1] === 0x53 && fileBytes[2] === 0x54;

  for (const field of FIELDS) {
    const id = field.id;
    const val = readField(fileBytes, field);
    originalValues[id] = val;
    document.getElementById('val-' + id).value = val;
    markChanged(id, false);
  }

  document.getElementById('fileInfo').innerHTML = isNST
    ? '<div class="file-info-row">' +
        '<span class="file-chip">📁 ' + fileName + '</span>' +
        '<span class="file-chip">' + fileBytes.length + ' bytes</span>' +
        '<span class="file-chip status-ok">✔ NST confirmed · state loaded</span>' +
      '</div>'
    : '<div class="file-info-row">' +
        '<span class="file-chip">📁 ' + fileName + '</span>' +
        '<span class="file-chip">' + fileBytes.length + ' bytes</span>' +
        '<span class="file-chip status-warn">⚠ NST magic not found</span>' +
      '</div>';
  document.getElementById('fileInfo').className = 'file-info visible';

  document.getElementById('fieldsSection').className = 'fields-section visible';
  document.getElementById('actionsSection').style.display = 'flex';

  if (isNST) {
    const s = document.getElementById('status');
    s.textContent = '';
    s.className = 'status';
  } else {
    setStatus('⚠ Loaded but NST header not found. Check WRM offset in Advanced if values look wrong.', 'warn');
  }
}

// ── Inputs ───────────────────────────────────────────────────
for (const field of FIELDS) {
  document.getElementById('val-' + field.id).addEventListener('input', function () {
    const v = Math.min(field.max, Math.max(0, parseInt(this.value) || 0));
    markChanged(field.id, v !== originalValues[field.id]);
  });
}

document.getElementById('wrmOffsetInput').addEventListener('change', () => {
  if (fileBytes) loadFile(new File([fileBytes], fileName));
});

// ── Save ─────────────────────────────────────────────────────
document.getElementById('btnSave').addEventListener('click', () => {
  if (!fileBytes) return setStatus('No file loaded.', 'error');
  const modified = new Uint8Array(fileBytes);

  for (const field of FIELDS) {
    const v = Math.min(field.max, Math.max(0, parseInt(document.getElementById('val-' + field.id).value) || 0));
    writeField(modified, field, v);
  }

  const blob = new Blob([modified], { type: 'application/octet-stream' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = fileName || 'State'; a.click();
  URL.revokeObjectURL(url);

  setStatus('✔ Downloaded "' + (fileName || 'State') + '" — replace the State file inside your .oesavestate bundle');
});

// ── Reset ────────────────────────────────────────────────────
document.getElementById('btnReset').addEventListener('click', () => {
  for (const field of FIELDS) {
    const v = originalValues[field.id] ?? 0;
    document.getElementById('val-' + field.id).value = v;
    markChanged(field.id, false);
  }
  setStatus('↺ Values reset to original');
});

// ── File input & drag/drop ───────────────────────────────────
document.getElementById('fileInput').addEventListener('change', e => {
  if (e.target.files[0]) loadFile(e.target.files[0]);
});
const dz = document.getElementById('dropZone');
dz.addEventListener('dragover',  e => { e.preventDefault(); dz.classList.add('drag-over'); });
dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
dz.addEventListener('drop', e => {
  e.preventDefault(); dz.classList.remove('drag-over');
  if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]);
});

// ── Advanced toggle ──────────────────────────────────────────
document.getElementById('advToggle').addEventListener('click', () => {
  const p    = document.getElementById('advPanel');
  const t    = document.getElementById('advToggle');
  const open = p.classList.toggle('visible');
  t.textContent = (open ? '▼' : '▶') + ' ADVANCED · WRM OFFSET OVERRIDE';
});

</script>
